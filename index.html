<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 4px solid #ffcc00; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="ui-layer" style="position: absolute; width: 800px; height: 600px; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; color: white; font-family: 'Arial Black', sans-serif; text-align: center;">
        <h1 style="font-size: 48px; color: #ffcc00; margin-bottom: 10px; text-shadow: 3px 3px #000;">KASUKABE ADVENTURE</h1>
        <p style="font-size: 18px; margin-bottom: 30px;">MISSION: Collect 15 Action Kamen Cards<br>AVOID: Misae and the Crows!</p>
        <button id="start-btn" style="padding: 15px 40px; font-size: 24px; cursor: pointer; background: #00ff00; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 5px #008800;">START GAME</button>
    </div>

    <div id="game-container"></div>
    <script src="game.js"></script>
</body>
</html>
